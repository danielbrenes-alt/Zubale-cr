<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Zubale CR | Logistics Control Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0" rel="stylesheet"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        enterprise: { 50: '#F8FAFC', 100: '#F1F5F9', 200: '#E2E8F0', 300: '#CBD5E1', 400: '#94A3B8', 600: '#475569', 700: '#334155', 800: '#1E293B', 900: '#0F172A' },
                        accent: { 500: '#4F46E2', 600: '#4338CA' }
                    }
                }
            }
        }
    </script>
    <style>
        body { transition: background-color 0.3s; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(8px); border: 1px solid #E2E8F0; }
        .dark .glass-card { background: rgba(30, 41, 59, 0.7); border: 1px solid #334155; }
        .stat-card-gradient { background: linear-gradient(135deg, #ffffff 0%, #f1f5f9 100%); }
        .dark .stat-card-gradient { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
        .toast { animation: slideInRight 0.4s ease, fadeOut 0.4s ease 2.6s forwards; position: relative; z-index: 100; }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
        .loader { width: 14px; height: 14px; border: 2px solid #4F46E2; border-bottom-color: transparent; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #panel-analitica { transition: max-height 0.4s ease-in-out, opacity 0.3s; overflow: hidden; }
        .collapsed { max-height: 0; opacity: 0; pointer-events: none; }
        .expanded { max-height: 800px; opacity: 1; margin-bottom: 2rem; }
        .alerta-exceso { animation: pulse-red 2s infinite; background-color: rgba(239, 68, 68, 0.15) !important; color: #ef4444 !important; border: 1px solid #ef4444 !important; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    </style>
</head>

<body class="font-sans antialiased bg-[#F8FAFC] text-enterprise-800 dark:bg-enterprise-900 dark:text-enterprise-100 transition-colors duration-200" onload="initApp()">
    
    <input type="file" id="input-slot" class="hidden" accept=".xlsx,.xls,.csv" multiple />
    <input type="file" id="input-soluciones" class="hidden" accept=".xlsx,.xls,.csv" multiple />
    <input type="file" id="input-inyectar" class="hidden" accept=".xlsx,.xls,.csv" multiple />

    <div id="toast-container" class="fixed top-20 right-6 z-[100] flex flex-col gap-2"></div>

    <header class="sticky top-0 z-40 w-full border-b border-enterprise-200 dark:border-enterprise-800 bg-white/80 dark:bg-enterprise-900/80 backdrop-blur-md">
        <div class="max-w-[1440px] mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-6">
                <div class="flex items-center space-x-4">
                    <div class="w-8 h-8 bg-accent-500 rounded-lg flex items-center justify-center text-white font-bold shadow-lg shadow-accent-500/20">Z</div>
                    <h1 class="text-lg font-bold tracking-tight text-enterprise-900 dark:text-white leading-none italic">Zubale <span class="text-accent-500">CR</span></h1>
                </div>
            </div>
            <div class="flex items-center space-x-4">
                <div id="sync-status" class="flex items-center gap-3 px-4 py-2 bg-enterprise-100 dark:bg-enterprise-800 rounded-xl">
                    <div id="loading-spinner" class="hidden"><span class="loader"></span></div>
                    <span id="sync-text" class="text-[10px] font-black uppercase tracking-widest text-enterprise-500 dark:text-enterprise-400">Sincronizado</span>
                    <span id="sync-dot" class="w-2 h-2 bg-emerald-500 rounded-full"></span>
                </div>
                <button onclick="toggleAnalitica()" class="p-2 w-10 h-10 flex items-center justify-center rounded-xl bg-enterprise-100 dark:bg-enterprise-800 border border-enterprise-200 dark:border-enterprise-700 hover:scale-105 transition-all shadow-sm">
                    <span class="material-symbols-outlined text-lg">history</span>
                </button>
                <button onclick="toggleTheme()" class="p-2 w-10 h-10 flex items-center justify-center rounded-xl bg-enterprise-100 dark:bg-enterprise-800 border border-enterprise-200 dark:border-enterprise-700 text-lg hover:scale-105 transition-all shadow-sm">🌓</button>
            </div>
        </div>
    </header>

    <main class="max-w-[1440px] mx-auto px-6 py-8">
        <section class="grid grid-cols-1 md:grid-cols-5 gap-4 mb-8 text-center">
            <div class="stat-card-gradient p-4 rounded-2xl border border-enterprise-200 dark:border-enterprise-800 shadow-sm">
                <span class="text-[9px] font-black text-enterprise-500 uppercase tracking-widest">Total Batch 1</span>
                <div id="total-b1" class="text-2xl font-black text-enterprise-900 dark:text-white mt-1">0</div>
            </div>
            <div class="stat-card-gradient p-4 rounded-2xl border border-enterprise-200 dark:border-enterprise-800 shadow-sm">
                <span class="text-[9px] font-black text-enterprise-500 uppercase tracking-widest">Total Batch 2</span>
                <div id="total-b2" class="text-2xl font-black text-enterprise-900 dark:text-white mt-1">0</div>
            </div>
            <div class="stat-card-gradient p-4 rounded-2xl border border-enterprise-200 dark:border-enterprise-800 shadow-sm">
                <span class="text-[9px] font-black text-orange-500 uppercase tracking-widest italic">Repro Global</span>
                <div id="total-repro" class="text-2xl font-black text-orange-600 mt-1">0</div>
            </div>
            <div class="stat-card-gradient p-4 rounded-2xl border border-enterprise-200 dark:border-enterprise-800 shadow-sm">
                <span class="text-[9px] font-black text-indigo-500 uppercase tracking-widest italic">Sols Global</span>
                <div id="total-sols" class="text-2xl font-black text-indigo-600 mt-1">0</div>
            </div>
            <div class="bg-enterprise-900 dark:bg-accent-600 p-4 rounded-2xl border border-enterprise-800 shadow-lg">
                <span class="text-[9px] font-black text-white/70 uppercase tracking-widest">Total General</span>
                <div id="gran-total" class="text-2xl font-black text-white mt-1">0</div>
            </div>
        </section>

        <section id="panel-analitica" class="collapsed grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="glass-card p-6 rounded-[2rem] shadow-xl border-accent-500/30">
                <h3 class="text-[10px] font-black uppercase tracking-widest text-accent-500 mb-3 italic underline">Consulta Histórica</h3>
                <div class="flex items-center gap-3">
                    <input type="date" id="fecha-historico" class="bg-white dark:bg-enterprise-800 border-enterprise-200 dark:border-enterprise-700 rounded-xl text-xs font-bold p-3 w-full text-enterprise-900 dark:text-white outline-none">
                    <button onclick="cargarDiaEspecifico()" class="p-3 bg-accent-500 text-white rounded-xl hover:bg-accent-600 shadow-lg transition-all">
                        <span class="material-symbols-outlined text-sm">search</span>
                    </button>
                </div>
            </div>
            <div class="glass-card p-6 rounded-[2rem] shadow-xl border-red-500/20">
                <h3 class="text-[10px] font-black uppercase tracking-widest text-red-500 mb-3 italic">Limpieza Master (Borradores)</h3>
                <div class="flex flex-col gap-2">
                    <div class="flex gap-2">
                        <input type="date" id="delete-start" class="bg-white dark:bg-enterprise-800 border-enterprise-200 dark:border-enterprise-700 rounded-lg text-[10px] p-2 w-full">
                        <input type="date" id="delete-end" class="bg-white dark:bg-enterprise-800 border-enterprise-200 dark:border-enterprise-700 rounded-lg text-[10px] p-2 w-full">
                    </div>
                    <button onclick="limpiezaMasterRango()" class="w-full py-2 bg-red-600 text-white rounded-lg font-black text-[10px] uppercase tracking-widest hover:bg-red-700 transition-all shadow-md">Ejecutar Borrado</button>
                </div>
            </div>
            <div class="glass-card p-6 rounded-[2rem] shadow-xl border-enterprise-300 dark:border-enterprise-700 text-center">
                <h3 class="text-[10px] font-black uppercase tracking-widest text-enterprise-500 italic mb-4">Comparativa Mensual</h3>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-enterprise-50 dark:bg-enterprise-900/40 p-4 rounded-xl">
                        <p class="text-[9px] font-bold text-enterprise-400 uppercase">Mes Anterior</p>
                        <div id="val-mes-ant" class="text-2xl font-black">---</div>
                    </div>
                    <div class="bg-accent-500/5 p-4 rounded-xl">
                        <p class="text-[9px] font-bold text-accent-500 uppercase">Diferencia</p>
                        <div id="val-dif" class="text-2xl font-black text-accent-500">---</div>
                    </div>
                </div>
            </div>
        </section>

        <section class="glass-card p-6 rounded-[2rem] shadow-xl mb-8">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-4">
                    <select id="slot-selector" class="px-4 py-3 text-[10px] font-black bg-white dark:bg-enterprise-800 border border-enterprise-200 dark:border-enterprise-700 rounded-xl outline-none text-enterprise-700 dark:text-white uppercase tracking-tighter">
                        <option value="1">S1</option><option value="2">S2</option><option value="3">S3</option><option value="4">S4</option>
                        <option value="5">S5</option><option value="6">S6</option><option value="7">S7</option><option value="8">S8</option>
                    </select>
                    <button onclick="document.getElementById('input-slot').click()" class="px-6 py-3 bg-accent-500 text-white rounded-xl font-black text-[10px] uppercase tracking-widest hover:bg-accent-600 transition-all shadow-lg">Subir Slot Diario</button>
                </div>
                <div class="flex gap-3">
                    <button onclick="document.getElementById('input-soluciones').click()" class="px-4 py-3 bg-white dark:bg-enterprise-800 text-enterprise-700 dark:text-white border border-enterprise-200 dark:border-enterprise-700 rounded-xl font-black text-[10px] uppercase underline">Cargar Soluciones</button>
                    <button onclick="document.getElementById('input-inyectar').click()" class="px-4 py-3 bg-enterprise-800 dark:bg-enterprise-700 text-white rounded-xl font-black text-[10px] uppercase italic">Inyectar Turno Anterior</button>
                </div>
            </div>
            <div class="mt-4 pt-4 border-t border-enterprise-100 dark:border-enterprise-700 flex justify-between items-center">
                <p class="text-[10px] font-black text-enterprise-400 dark:text-enterprise-500 uppercase tracking-widest italic">Motor Turbo Híbrido: Sincronización de Slot Activa</p>
                <div class="flex gap-4">
                    <button onclick="exportarExcel()" class="px-4 py-2 bg-emerald-600 text-white rounded-xl font-black text-[10px] uppercase shadow-md flex items-center gap-2">
                        <span class="material-symbols-outlined text-xs">download</span> Exportar Excel Detallado
                    </button>
                    <button onclick="limpiarTodo()" class="text-red-500 font-black text-[10px] uppercase hover:underline">Reiniciar Dashboard (Hoy)</button>
                </div>
            </div>
        </section>

        <div class="space-y-12">
            <div>
                <div class="flex items-center gap-4 mb-6"><div class="h-px flex-1 bg-enterprise-200 dark:bg-enterprise-800"></div><span class="text-[10px] font-black uppercase tracking-[0.3em] text-accent-500 italic">Batch 1</span><div class="h-px flex-1 bg-enterprise-200 dark:bg-enterprise-800"></div></div>
                <div id="container-b1" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"></div>
            </div>
            <div>
                <div class="flex items-center gap-4 mb-6"><div class="h-px flex-1 bg-enterprise-200 dark:bg-enterprise-800"></div><span class="text-[10px] font-black uppercase tracking-[0.3em] text-enterprise-400 italic">Batch 2</span><div class="h-px flex-1 bg-enterprise-200 dark:bg-enterprise-800"></div></div>
                <div id="container-b2" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"></div>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://wuslgkvzkbqlzzmbrkkl.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_JgDL7NGH4Y4Awof_kQwZ_A_wN7SAjDt';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const allStores = ["Wm Alajuela", "Wm Heredia", "Wm Heredia Este", "Wm Tibas", "Wm Escazu", "Wm Santa Ana", "Wm Guadalupe", "Wm Desamparados"];
        const batch1Stores = ["Wm Alajuela", "Wm Heredia", "Wm Heredia Este", "Wm Tibas"];
        const batch2Stores = ["Wm Escazu", "Wm Santa Ana", "Wm Guadalupe", "Wm Desamparados"];
        
        let db = {};
        let idsProcesadosLocal = new Set();
        let fechaVistaActual = obtenerFechaHoy();

        function obtenerFechaHoy() { return new Date().toISOString().split('T')[0]; }

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('zubale_theme', isDark ? 'dark' : 'light');
        }

        function toggleAnalitica() {
            const p = document.getElementById('panel-analitica');
            p.classList.toggle('collapsed'); p.classList.toggle('expanded');
        }

        async function initApp() {
            if (localStorage.getItem('zubale_theme') === 'dark') document.documentElement.classList.add('dark');
            allStores.forEach(name => db[name] = { slots: Array(8).fill(0), sol: 0, repro: 0, editor: '---' });
            await cargarDatosDesdeNube();
            escucharCambiosRealtime();
            ejecutarComparativa();
        }

        async function cargarDatosDesdeNube() {
            const { data } = await _supabase.from('ZCR_LOGISTICS').select('*').eq('fecha_reporte', fechaVistaActual);
            if (data) {
                data.forEach(row => {
                    if (db[row.tienda]) {
                        db[row.tienda].slots = [row.slot_1, row.slot_2, row.slot_3, row.slot_4, row.slot_5, row.slot_6, row.slot_7, row.slot_8];
                        db[row.tienda].editor = row.ultimo_editor || '---';
                    }
                });
                actualizarUI();
            }
        }

        function escucharCambiosRealtime() {
            _supabase.channel('sync').on('postgres_changes', { event: '*', schema: 'public', table: 'ZCR_LOGISTICS' }, cargarDatosDesdeNube).subscribe();
        }

        async function ejecutarComparativa() {
            const { data } = await _supabase.from('ZCR_LOGISTICS').select('total, fecha_reporte');
            if (data) {
                const hoy = new Date(); const mesActual = hoy.getMonth();
                const tActual = data.filter(r => new Date(r.fecha_reporte).getMonth() === mesActual).reduce((a, b) => a + (b.total || 0), 0);
                const tAnt = data.filter(r => new Date(r.fecha_reporte).getMonth() === mesActual - 1).reduce((a, b) => a + (b.total || 0), 0);
                document.getElementById('val-mes-ant').innerText = tAnt.toLocaleString();
                const d = tActual - tAnt;
                document.getElementById('val-dif').innerText = (d >= 0 ? "+" : "") + d.toLocaleString();
            }
        }

        async function procesarMultiplesArchivos(input, source, slotIdx = null) {
            const files = input.files;
            if (files.length === 0) return;
            document.getElementById('loading-spinner').classList.remove('hidden');
            let tiendasImpactadas = new Set();
            let pedidosNube = [];

            for (let i = 0; i < files.length; i++) {
                const data = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => resolve(XLSX.utils.sheet_to_json(XLSX.read(new Uint8Array(e.target.result), {type: 'array'}).Sheets[XLSX.read(new Uint8Array(e.target.result), {type: 'array'}).SheetNames[0]]));
                    reader.readAsArrayBuffer(files[i]);
                });

                data.forEach(fila => {
                    const tienda = buscarTienda(fila);
                    let idRaw = fila.ID || fila.id || fila.Pedido || fila.PEDIDO;
                    if (!idRaw && fila.Titulo) idRaw = fila.Titulo.split('-')[0].trim();
                    const id = String(idRaw);
                    const texto = Object.values(fila).join("|").toUpperCase();

                    if (tienda && idRaw && !idsProcesadosLocal.has(id)) {
                        idsProcesadosLocal.add(id);
                        tiendasImpactadas.add(tienda);
                        if (texto.includes("REPRO")) db[tienda].repro++;
                        else if (texto.includes("SOLUCION")) db[tienda].sol++;
                        else {
                            db[tienda].slots[slotIdx || 0]++;
                            if (source === 'slot') pedidosNube.push({ id_pedido: id, tienda, fecha: obtenerFechaHoy() });
                        }
                    }
                });
            }

            if (source === 'slot' && pedidosNube.length > 0) {
                for (let i = 0; i < pedidosNube.length; i += 200) await _supabase.from('ZCR_PEDIDOS_PROCESADOS').upsert(pedidosNube.slice(i, i + 200));
                for (let t of tiendasImpactadas) {
                    await _supabase.from('ZCR_LOGISTICS').upsert({
                        tienda: t, fecha_reporte: obtenerFechaHoy(),
                        slot_1: db[t].slots[0], slot_2: db[t].slots[1], slot_3: db[t].slots[2], slot_4: db[t].slots[3],
                        slot_5: db[t].slots[4], slot_6: db[t].slots[5], slot_7: db[t].slots[6], slot_8: db[t].slots[7],
                        total: db[t].slots.reduce((a,b)=>a+b, 0), ultimo_editor: "Auditoría V2"
                    }, { onConflict: 'tienda, fecha_reporte' });
                }
            }
            input.value = ""; actualizarUI();
            document.getElementById('loading-spinner').classList.add('hidden');
        }

        function buscarTienda(fila) {
            const txt = Object.values(fila).join("|").toUpperCase();
            if (txt.includes("ALAJUELA")) return "Wm Alajuela";
            if (txt.includes("HEREDIA ESTE")) return "Wm Heredia Este";
            if (txt.includes("HEREDIA")) return "Wm Heredia";
            if (txt.includes("TIBAS") || txt.includes("TIBÁS")) return "Wm Tibas";
            if (txt.includes("ESCAZU") || txt.includes("ESCAZÚ")) return "Wm Escazu";
            if (txt.includes("SANTA ANA")) return "Wm Santa Ana";
            if (txt.includes("GUADALUPE")) return "Wm Guadalupe";
            if (txt.includes("DESAMPARADOS")) return "Wm Desamparados";
            return null;
        }

        function generarCardHTML(name) {
            const s = db[name];
            const total = s.slots.reduce((a,b)=>a+b, 0) + s.sol + s.repro;
            return `
            <div class="bg-white dark:bg-enterprise-800 p-5 rounded-2xl border border-enterprise-200 dark:border-enterprise-700 shadow-sm text-center">
                <div class="flex justify-between items-center mb-4 italic font-black text-[11px] uppercase dark:text-white">${name} <span class="text-accent-500 font-black">${total}</span></div>
                <div class="grid grid-cols-4 gap-2 mb-3">
                    ${s.slots.map((v, i) => {
                        const limite = (i < 6) ? 18 : 15;
                        const alerta = (v > limite) ? 'alerta-exceso' : (v > 0 ? 'bg-emerald-500/10 text-emerald-600' : 'bg-gray-50 text-gray-400 dark:bg-enterprise-900/50');
                        return `<div class="text-[9px] p-2 rounded-lg font-black transition-all ${alerta}">S${i+1}: ${v}</div>`;
                    }).join('')}
                </div>
                <div class="grid grid-cols-2 gap-2 mb-2">
                    <div class="px-2 py-1 bg-orange-50 dark:bg-orange-900/20 text-orange-600 text-[8px] font-black rounded border border-orange-100 dark:border-orange-800 italic uppercase">R: ${s.repro}</div>
                    <div class="px-2 py-1 bg-indigo-50 dark:bg-indigo-900/20 text-indigo-600 text-[8px] font-black rounded border border-indigo-100 dark:border-indigo-800 italic uppercase">S: ${s.sol}</div>
                </div>
                <p class="text-[8px] text-enterprise-400 uppercase font-black tracking-widest italic mt-2">Audit: ${s.editor}</p>
            </div>`;
        }

        function actualizarUI() {
            document.getElementById('container-b1').innerHTML = batch1Stores.map(n => generarCardHTML(n)).join('');
            document.getElementById('container-b2').innerHTML = batch2Stores.map(n => generarCardHTML(n)).join('');
            let b1 = 0, b2 = 0, solT = 0, reproT = 0;
            allStores.forEach(name => {
                const sum = db[name].slots.reduce((a,b)=>a+b, 0);
                if (batch1Stores.includes(name)) b1 += sum; else b2 += sum;
                solT += db[name].sol; reproT += db[name].repro;
            });
            document.getElementById('total-b1').innerText = b1; document.getElementById('total-b2').innerText = b2;
            document.getElementById('total-repro').innerText = reproT; document.getElementById('total-sols').innerText = solT;
            document.getElementById('gran-total').innerText = b1 + b2 + solT + reproT;
        }

        async function cargarDiaEspecifico() {
            const fecha = document.getElementById('fecha-historico').value;
            if (!fecha) return;
            fechaVistaActual = fecha;
            allStores.forEach(name => db[name] = { slots: Array(8).fill(0), sol: 0, repro: 0, editor: '---' });
            await cargarDatosDesdeNube();
        }

        async function limpiezaMasterRango() {
            const start = document.getElementById('delete-start').value;
            const end = document.getElementById('delete-end').value;
            const pin = prompt("PIN:");
            if (pin !== "2026") return;
            await _supabase.from('ZCR_LOGISTICS').delete().gte('fecha_reporte', start).lte('fecha_reporte', end);
            location.reload();
        }

        async function limpiarTodo() {
            if(confirm("¿Reiniciar Dashboard? Se perderán conteos locales.")) {
                idsProcesadosLocal.clear();
                allStores.forEach(name => db[name] = { slots: Array(8).fill(0), sol: 0, repro: 0, editor: '---' });
                actualizarUI();
            }
        }

        function exportarExcel() {
            const dataExport = allStores.map(name => {
                const s = db[name];
                const sumaSlots = s.slots.reduce((a, b) => a + b, 0);
                return {
                    "Batch": batch1Stores.includes(name) ? "B1" : "B2",
                    "Tienda": name,
                    "Slot 1": s.slots[0],
                    "Slot 2": s.slots[1],
                    "Slot 3": s.slots[2],
                    "Slot 4": s.slots[3],
                    "Slot 5": s.slots[4],
                    "Slot 6": s.slots[5],
                    "Slot 7": s.slots[6],
                    "Slot 8": s.slots[7],
                    "Repro (R)": s.repro,
                    "Soluciones (S)": s.sol,
                    "TOTAL GENERAL": sumaSlots + s.sol + s.repro,
                    "Último Editor": s.editor
                };
            });

            const ws = XLSX.utils.json_to_sheet(dataExport);
            
            // Estilización de columnas
            const wscols = [
                {wch: 8}, {wch: 20}, {wch: 6}, {wch: 6}, {wch: 6}, {wch: 6}, 
                {wch: 6}, {wch: 6}, {wch: 6}, {wch: 6}, {wch: 10}, {wch: 12}, 
                {wch: 15}, {wch: 20}
            ];
            ws['!cols'] = wscols;

            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Logistica Detallada");
            const fecha = new Date().toISOString().split('T')[0];
            XLSX.writeFile(wb, `ZubaleCR_Logistica_${fecha}.xlsx`);
        }

        function mostrarToast(m, t) {
            const c = document.getElementById('toast-container');
            const d = document.createElement('div');
            d.className = `toast px-5 py-3 rounded-xl text-[10px] font-black uppercase text-white shadow-xl ${t==='success'?'bg-emerald-600':'bg-red-600'}`;
            d.innerText = m; c.appendChild(d);
            setTimeout(() => d.remove(), 4000);
        }

        document.getElementById('input-slot').addEventListener('change', function() { procesarMultiplesArchivos(this, 'slot', parseInt(document.getElementById('slot-selector').value) - 1); });
        document.getElementById('input-soluciones').addEventListener('change', function() { procesarMultiplesArchivos(this, 'sol'); });
        document.getElementById('input-inyectar').addEventListener('change', function() { procesarMultiplesArchivos(this, 'inyectar', 0); });
    </script>
</body>
</html>
